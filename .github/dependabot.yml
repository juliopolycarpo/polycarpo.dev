version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (Dependabot updates both the
  # pin and the trailing version comment).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

# npm dependency updates are intentionally NOT handled by Dependabot: it does not
# update Bun's text lockfile (bun.lock), so its PRs change only package.json and
# then fail CI's `bun install --frozen-lockfile`. A Bun-aware tool (Renovate) is
# tracked separately.
