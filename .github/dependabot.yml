version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (Dependabot updates both the
  # pin and the trailing version comment).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      astro:
        patterns:
          - astro
          - "@astrojs/*"
