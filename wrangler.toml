name = "polycarpo"
compatibility_date = "2026-06-01"

# Cloudflare Workers Static Assets: serve the prebuilt static site from ./dist.
# This is an assets-only Worker (no server script). Build first
# (`bun run build`), then `wrangler deploy`.
[assets]
directory = "./dist"
# Astro emits 404.html; serve it for unmatched paths.
not_found_handling = "404-page"

# The custom domain polycarpo.dev is attached in the Cloudflare dashboard
# (Workers > polycarpo > Settings > Domains), or via a route once the zone for
# polycarpo.dev lives on the account:
# routes = [{ pattern = "polycarpo.dev", custom_domain = true }]
